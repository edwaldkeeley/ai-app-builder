services:
  db:
    image: postgres:16-alpine
    container_name: ai-sandbox-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_design_sandbox
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-sandbox-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_design_sandbox
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
      DATABASE_POOL_MIN_SIZE: "2"
      DATABASE_POOL_MAX_SIZE: "10"
      TARGET_URL: "${TARGET_URL}"
      JWT_TOKEN: "${JWT_TOKEN}"
      MODEL: "${MODEL}"
      FIGMA_CLIENT_ID: "${FIGMA_CLIENT_ID}"
      FIGMA_CLIENT_SECRET: "${FIGMA_CLIENT_SECRET}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-sandbox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  pgdata:
